<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roselle — لوحة التحكم</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --pink: #fbe4ea;
  --maroon: #6e1a32;
  --rose: #b85c73;
  --muted: #8a5d68;
  --card: #ffffff;
  --radius: 16px;
}

body {
  font-family: 'Cairo', sans-serif;
  background: var(--pink);
  color: #3a1420;
  min-height: 100vh;
  padding: 24px 16px 60px;
}

.header {
  text-align: center;
  margin-bottom: 28px;
}
.header img {
  width: 140px;
  margin-bottom: 8px;
  border-radius: 12px;
}
.header h1 {
  font-size: 22px;
  font-weight: 800;
  color: var(--maroon);
}
.header p { font-size: 13px; color: var(--muted); margin-top: 4px; }

/* ── LOGIN ── */
.login-box {
  background: white;
  border-radius: var(--radius);
  padding: 28px 22px;
  max-width: 420px;
  margin: 0 auto 24px;
}
.login-box h2 { font-size: 18px; font-weight: 800; color: var(--maroon); margin-bottom: 16px; }
.field { margin-bottom: 12px; }
.field label { font-size: 13px; font-weight: 700; color: var(--muted); display: block; margin-bottom: 5px; }
.field input {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid #e8cdd5;
  border-radius: 10px;
  font-family: 'Cairo', sans-serif;
  font-size: 14px; outline: none;
  transition: border-color 0.2s;
}
.field input:focus { border-color: var(--maroon); }

.btn-primary {
  width: 100%; background: var(--maroon); color: white;
  border: none; border-radius: 10px; padding: 14px;
  font-size: 15px; font-weight: 700;
  font-family: 'Cairo', sans-serif;
  cursor: pointer; transition: opacity 0.2s;
}
.btn-primary:hover { opacity: 0.88; }

/* ── MAIN PANEL ── */
#panel { display: none; max-width: 480px; margin: 0 auto; }

.section-card {
  background: white; border-radius: var(--radius);
  padding: 22px; margin-bottom: 14px;
}
.section-card h2 {
  font-size: 16px; font-weight: 800;
  color: var(--maroon); margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}

/* ── PRODUCT LIST ── */
.product-list { display: flex; flex-direction: column; gap: 10px; }

.product-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--pink); border-radius: 12px;
  padding: 10px 12px;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.product-item img {
  width: 60px; height: 60px;
  object-fit: cover; border-radius: 10px;
  flex-shrink: 0;
}
.product-item-info { flex: 1; min-width: 0; }
.product-item-name {
  font-size: 14px; font-weight: 700;
  color: #3a1420;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.product-item-tag {
  font-size: 11px; color: var(--muted); margin-top: 2px;
}
.btn-delete {
  background: #ffe0e8; color: #b0243e;
  border: none; border-radius: 8px;
  padding: 6px 12px; font-size: 12px;
  font-weight: 700; font-family: 'Cairo', sans-serif;
  cursor: pointer; flex-shrink: 0;
  transition: background 0.2s;
}
.btn-delete:hover { background: #ffc5d0; }

/* ── ADD PRODUCT FORM ── */
.add-form { display: flex; flex-direction: column; gap: 10px; }

.img-upload-area {
  border: 2px dashed #e8cdd5;
  border-radius: 12px;
  padding: 24px 16px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
}
.img-upload-area:hover { border-color: var(--rose); background: #fff5f7; }
.img-upload-area input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer;
}
.img-upload-area p { font-size: 13px; color: var(--muted); font-weight: 600; }
.img-upload-area span { font-size: 28px; display: block; margin-bottom: 6px; }

#imgPreview {
  width: 100%; max-height: 200px; object-fit: cover;
  border-radius: 10px; display: none; margin-top: 8px;
}

.tag-select {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.tag-opt {
  padding: 6px 14px; border-radius: 100px;
  border: 1.5px solid #e8cdd5;
  font-size: 12px; font-weight: 700;
  cursor: pointer; color: var(--muted);
  font-family: 'Cairo', sans-serif;
  background: white;
  transition: all 0.2s;
}
.tag-opt.selected {
  background: var(--maroon); color: white; border-color: var(--maroon);
}

/* ── UPDATE BUTTON ── */
.update-btn {
  width: 100%; background: linear-gradient(135deg, var(--maroon), #a02848);
  color: white; border: none; border-radius: 12px;
  padding: 18px; font-size: 16px; font-weight: 800;
  font-family: 'Cairo', sans-serif; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  box-shadow: 0 6px 24px rgba(110,26,50,0.3);
  transition: transform 0.2s, box-shadow 0.2s;
  margin-top: 4px;
}
.update-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(110,26,50,0.35); }
.update-btn:active { transform: scale(0.98); }

.success-msg {
  background: #d4f5e4; color: #1a6640;
  border-radius: 10px; padding: 12px 16px;
  font-size: 13px; font-weight: 700;
  text-align: center; display: none;
  margin-top: 8px;
}

.logout-btn {
  width: 100%; background: transparent;
  color: var(--muted); border: 1.5px solid #e8cdd5;
  border-radius: 10px; padding: 12px;
  font-size: 14px; font-weight: 700;
  font-family: 'Cairo', sans-serif;
  cursor: pointer; margin-top: 8px;
}
</style>
</head>
